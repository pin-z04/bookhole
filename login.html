{% extends 'layout.html' %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto; background-color: #fff;">
    <h2 style="text-align: center;">進入書洞</h2>
    <form method="POST" action="/login">
        <label>使用者名稱：</label>
        <input type="text" name="username" required>
        
        <label>密碼：</label>
        <div style="position: relative;">
            <input type="password" name="password" id="passwordField" required>
            <button type="button" id="toggleBtn" 
                    style="position: absolute; right: 10px; top: 10px; border: none; background: none; cursor: pointer; font-size: 12px; color: #666;">
                顯示
            </button>
        </div>
        
        <button type="submit" name="action" value="login" class="btn-primary">登入</button>
        <button type="submit" name="action" value="register" class="btn-secondary">註冊新帳號</button>
    </form>
</div>

<script>
    const passwordField = document.getElementById('passwordField');
    const toggleBtn = document.getElementById('toggleBtn');

    toggleBtn.addEventListener('click', function() {
        // 切換類型：如果是 password 就變成 text，反之亦然
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            toggleBtn.textContent = '隱藏';
        } else {
            passwordField.type = 'password';
            toggleBtn.textContent = '顯示';
        }
    });
</script>
{% endblock %}
